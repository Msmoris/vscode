
<!DOCTYPE html> <!--Informa ao navegador que o documento usa html-->
<html> <!--Tag raiz, tudo da pagina fica dentro dela--> 
    <head> <!--Guarda informações que não aparecem diretamenta na pagina, como titulo, links para css e configurções.-->
        <title> Curso de webdesign </title> <!--Define o nome que aparece na aba do navegador.-->
    </head>
<body> <!--Contém tudo que será exibido para o usuario-->
    <h1> Primeiro nivel de cabeçalho </h1><p> <!-- h1 cria um titulo principal-->
        bem vindo ao mundo do html. Este é o primeiro paragrafo.<p> <!--Cria um paragrafo-->
        este é o segundo paragrafo.
    <h2> Esse é um cabeçalho grande, mas menor que h1 </h2>
    <h3> Esse cabeçalho é menor que h2 </h3>
    <h4> Esse cabeçalho é menor que h3 </h4>
    <h5> Esse cabeçalho é menor que h4 </h5>
    <h6> Esse cabeçalho é menor que h5 </h6>
    </body>
    </html>
